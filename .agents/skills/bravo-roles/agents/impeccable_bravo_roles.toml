[agent]
name = "bravo_roles_agent"
version = "1.0.0"
description = "Agente especializado para atuar sobre as diretrizes da skill bravo-roles."
provider = "gemini"

[execution]
mode = "validation_loop"
trigger_on = ["git_commit", "manual_invocation"]

[context]
base_skill = "../SKILL.md"
reference_dir = "../references/"

[scope]
include_extensions = [".ts", ".html", ".scss", ".json"]
exclude_paths = [
    "node_modules/**",
    "www/**",
    ".angular/**"
]

[rules]
check_compliance = true

[output]
format = "markdown"
destination = "stdout"
generate_diff = true
