<ion-app>
  <ion-split-pane contentId="main-content">
    
    <!-- Menu Lateral -->
    <ion-menu contentId="main-content" type="overlay">
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>Super Admin</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content>
        <ion-list>
          <ion-menu-toggle auto-hide="false">
            
            <ion-item routerLink="/super-admin/super-dashboard" routerDirection="root" routerLinkActive="selected">
              <ion-icon name="home-outline" slot="start"></ion-icon>
              <ion-label>Dashboard</ion-label>
            </ion-item>
            
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
      
      <ion-footer>
        <ion-toolbar>
          <ion-item lines="none" button (click)="logout()">
            <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
            <ion-label color="danger">Sair</ion-label>
          </ion-item>
        </ion-toolbar>
      </ion-footer>
    </ion-menu>

    <!-- Conteúdo Principal -->
    <div class="ion-page" id="main-content">
      <ion-router-outlet></ion-router-outlet>
    </div>

  </ion-split-pane>
</ion-app>
