<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
      <ion-back-button [defaultHref]="'/' + Strings.ADMIN_LIST_COLLABORATOR"></ion-back-button>
    </ion-buttons>
    
    <ion-title>
      @if (isLoading()) {
        Carregando...
      } @else {
        @if (isDetailsMode()) {
          Detalhes
        } @else if (isEditMode()) {
          Editar
        } @else {
          Novo
        } 
        Colaborador
      }
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (isLoading()) {
    <div class="ion-text-center ion-padding">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  } @else {
    <app-collaborator-form
      [data]="collaboratorData()"
      [isEditMode]="isEditMode()"
      [isReadOnly]="isDetailsMode() || (!isEditMode() && !!collaboratorData())"
      [isLoading]="isLoading()"
      (save)="onSave($event)">
    </app-collaborator-form>
  }
</ion-content>
