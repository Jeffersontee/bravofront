<ion-content [fullscreen]="true" class="bg-neutral">
  <!-- Cabeçalho Escuro (Hero Header) -->
  <div class="hero-header">
    <div class="header-nav">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/login" color="light" text=""></ion-back-button>
      </ion-buttons>
    </div>
    <h1 class="header-title">Criar uma conta</h1>
    <p class="header-desc">
      Preencha seus dados abaixo para solicitar serviços.
    </p>
  </div>

  <div class="floating-form-wrapper">
    <div class="bravo-card form-card">
      
      <ion-segment value="user" (ionChange)="segmentChanged($event)" class="bravo-segment">
        <ion-segment-button value="user">
          <ion-label>Você (CPF)</ion-label>
        </ion-segment-button>
        <ion-segment-button value="company">
          <ion-label>Empresa (CNPJ)</ion-label>
        </ion-segment-button>
      </ion-segment>

      <form #f1="ngForm" (ngSubmit)="onSubmit(f1)">
        
        <!-- Campos para Lojista (Empresa) -->
        <ng-container *ngIf="isCompany">
          <div class="input-wrapper">
            <ion-icon name="business-outline" class="input-icon"></ion-icon> 
            <input
              type="text"
              name="company_name"
              ngModel
              placeholder="Razão Social / Nome da Empresa"
              class="custom-input"
              required>
          </div>

          <div class="input-wrapper">
            <ion-icon name="document-text-outline" class="input-icon"></ion-icon> 
            <input
              type="text"
              name="cnpj"
              ngModel
              (input)="onCnpjInput($event)"
              placeholder="CNPJ"
              class="custom-input"
              required>
          </div>

          <div class="input-wrapper">
            <ion-icon name="person-outline" class="input-icon"></ion-icon> 
            <input
              type="text"
              name="owner_name"
              ngModel
              placeholder="Nome do Dono"
              class="custom-input"
              required>
          </div>
        </ng-container>

        <!-- Campos para Cliente (Pessoa Física) -->
        <ng-container *ngIf="!isCompany">
          <div class="input-wrapper">
            <ion-icon name="person-outline" class="input-icon"></ion-icon> 
            <input
              type="text"
              name="name"
              ngModel
              placeholder="Nome Completo"
              class="custom-input"
              required>
          </div>

          <div class="input-wrapper">
            <ion-icon name="document-outline" class="input-icon"></ion-icon> 
            <input
              type="text"
              name="cpf"
              ngModel
              placeholder="CPF"
              class="custom-input"
              required>
          </div>
        </ng-container>

        <!-- Campos Comuns -->
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon> 
          <input
            type="email"
            name="email"
            ngModel
            #emailCtrl="ngModel"
            placeholder="Email"
            class="custom-input"
            required>
        </div>

        <div class="input-wrapper">
          <ion-icon name="call-outline" class="input-icon"></ion-icon> 
          <input
            type="tel"
            name="phone"
            ngModel
            #phone="ngModel"
            placeholder="Telefone"
            class="custom-input"
            required
            minlength="11"
            maxlength="11">
        </div>

        <!-- Senha -->
        <div class="input-wrapper password-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon> 
          <input
            [type]="passwordHidden ? 'password' : 'text'"
            name="password"
            ngModel
            #passwordCtrl="ngModel"
            placeholder="Senha"
            class="custom-input password-input"
            required
            pattern="^(?=.*[a-zA-Z])(?=.*[0-9]).{8,}$"
            minlength="8">
          <button type="button" class="eye-btn" (click)="passwordHidden = !passwordHidden" aria-label="Alternar visibilidade">
            <ion-icon [name]="passwordHidden ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
          </button>
        </div>

        <!-- Confirmar Senha -->
        <div class="input-wrapper password-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon> 
          <input
            [type]="confirmPasswordHidden ? 'password' : 'text'"
            name="c_password"
            ngModel
            #c_passwordCtrl="ngModel"
            placeholder="Confirmar Senha"
            class="custom-input password-input"
            required
            pattern="^(?=.*[a-zA-Z])(?=.*[0-9]).{8,}$"
            minlength="8">
          <button type="button" class="eye-btn" (click)="confirmPasswordHidden = !confirmPasswordHidden" aria-label="Alternar visibilidade">
            <ion-icon [name]="confirmPasswordHidden ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
          </button>
        </div>

        <ion-text color="danger" *ngIf="c_passwordCtrl.valid && c_passwordCtrl.value != passwordCtrl.value">
          <p class="errorMsg" style="font-size: 13px; margin-top: -10px; margin-bottom: 16px;">* As senhas não conferem.</p>
        </ion-text>

        <button 
          *ngIf="!isLoading" 
          [disabled]="!f1.valid || (c_passwordCtrl.value != passwordCtrl.value)"
          [class.active-btn]="f1.valid && (c_passwordCtrl.value == passwordCtrl.value)"
          type="submit" 
          class="bravo-submit-btn">
          Inscrever-se
        </button>

        <button 
          *ngIf="isLoading" 
          disabled
          class="bravo-submit-btn active-btn">
          <ion-spinner name="crescent" style="width: 20px; height: 20px;"></ion-spinner>
        </button>
        
      </form>
    </div>
  </div>
</ion-content>
