<ion-content [fullscreen]="true" class="bg-neutral">
  <!-- Cabeçalho Escuro (Hero Header) -->
  <div class="hero-header">
    <div class="brand-container">
      <div class="brand-logo">
        <ion-icon name="construct" class="brand-icon"></ion-icon>
      </div>
      <span class="brand-text">BRAVO<br><span class="brand-subtext">INSTALAÇÕES</span></span>
    </div>

    <h1 class="header-title">
      Serviços técnicos para sua casa, <br>
      <span class="highlight-text">com agilidade e garantia.</span>
    </h1>

    <p class="header-desc">
      Hidráulica, elétrica, serralheria e mais — solicite pelo aplicativo de forma simples.
    </p>
  </div>

  <!-- Wrapper flutuante para o formulário -->
  <div class="floating-form-wrapper">
    <div class="bravo-card form-card">
      <h3 class="form-title">Acesse sua conta</h3>

      <!-- E-mail -->
      <div class="input-wrapper">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <input 
          type="email" 
          placeholder="E-mail" 
          [ngModel]="emailInput()" 
          (ngModelChange)="emailInput.set($event)"
          class="custom-input"
        />
      </div>

      <!-- Senha -->
      <div class="input-wrapper password-wrapper">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <input 
          [type]="type ? 'password' : 'text'"
          placeholder="Senha" 
          [ngModel]="passwordInput()" 
          (ngModelChange)="passwordInput.set($event)"
          class="custom-input password-input"
          (keyup.enter)="login()"
        />
        <!-- Botão Olho clicável -->
        <button type="button" class="eye-btn" (click)="changeType()" aria-label="Alternar visibilidade da senha">
          <ion-icon [name]="type ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
        </button>
      </div>

      <div class="forgot-password-container">
        <button id="forgot-password" class="forgot-password-btn">Esqueceu sua senha?</button>
      </div>

      <!-- Botão Entrar -->
      <button 
        (click)="login()" 
        [disabled]="!isFormValid() || isLogin()" 
        [class.active-btn]="isFormValid() && !isLogin()"
        class="bravo-submit-btn"
      >
        {{ isLogin() ? 'Aguarde...' : 'Entrar' }}
      </button>

      <div class="signup-prompt">
        Não tem uma conta? <a [routerLink]="Strings.SIGNUP" class="signup-link">Inscrever-se</a>
      </div>
    </div>
  </div>

  <ion-modal
    #forgot_pwd_modal
    trigger="forgot-password"
    cssClass="inline_modal"
    (ionModalDidDismiss)="reset($event)"
    [breakpoints]="[0.1, 0.5, 0.9]"
    [initialBreakpoint]="0.5">
    <ng-template>
      <app-reset-password
        [model]="reset_pwd_model"
        (check_email)="sendResetPasswordEmailOtp($event)"
        (verify_otp)="verifyResetPasswordOtp($event)"
        (set_password)="resetPassword($event)">
      </app-reset-password>
    </ng-template>
  </ion-modal>
</ion-content>
