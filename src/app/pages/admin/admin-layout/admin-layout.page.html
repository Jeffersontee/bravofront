<ion-app>
  <ion-split-pane contentId="main-content" when="lg" [class.collapsed]="isCollapsed">
    
    <ion-menu contentId="main-content">
      <ion-header class="ion-no-border">
        <ion-toolbar color="primary">
          <ion-buttons slot="start" class="ion-hide-lg-down">
            <ion-button (click)="toggleSidebar()">
              <ion-icon slot="icon-only" [name]="isCollapsed ? 'chevron-forward' : 'menu-outline'"></ion-icon>
            </ion-button>
          </ion-buttons>
          <ion-title *ngIf="!isCollapsed">Bravo Instalações</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content>
        <ion-list id="nav-list">
          @for (item of menuItems; track item.title) {
            @if (!item.children || item.children.length === 0) {
              <ion-menu-toggle auto-hide="false">
                <ion-item routerDirection="root" [routerLink]="item.url ? [item.url] : null" lines="none" detail="false" routerLinkActive="selected" class="menu-item level-1">
                  <ion-icon slot="start" [name]="item.icon"></ion-icon>
                  <ion-label *ngIf="!isCollapsed">{{ item.title }}</ion-label>
                </ion-item>
              </ion-menu-toggle>
            } @else {
              <ion-item (click)="item.open = !item.open" lines="none" detail="false" button class="menu-item level-1" [class.menu-item--open]="item.open">
                <ion-icon slot="start" [name]="item.icon"></ion-icon>
                <ion-label *ngIf="!isCollapsed">{{ item.title }}</ion-label>
                <ion-icon *ngIf="!isCollapsed" slot="end" [name]="item.open ? 'chevron-down' : 'chevron-forward'"></ion-icon>
              </ion-item>

              @if (item.open && !isCollapsed) {
                @for (child of item.children; track child.title) {
                  <ion-menu-toggle auto-hide="false">
                    <ion-item routerDirection="root" [routerLink]="child.url ? [child.url] : null" lines="none" detail="false" routerLinkActive="selected" class="menu-item level-2">
                      <ion-icon slot="start" [name]="child.icon"></ion-icon>
                      <ion-label>{{ child.title }}</ion-label>
                    </ion-item>
                  </ion-menu-toggle>
                }
              }
            }
          }
        </ion-list>

        <ion-list id="action-list">
          <ion-item (click)="onLogout()" lines="none" detail="false" class="logout-item" button>
            <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
            <ion-label color="danger" *ngIf="!isCollapsed">Sair</ion-label>
          </ion-item>
        </ion-list>
      </ion-content>
    </ion-menu>

    <div id="main-content" class="ion-page">
      <ion-router-outlet></ion-router-outlet>
    </div>

  </ion-split-pane>
</ion-app>
