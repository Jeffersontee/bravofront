<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
      <!-- <ion-back-button defaultHref="/establishment-admin/ingredients"></ion-back-button> -->
    </ion-buttons>
    <ion-title>Serviços</ion-title>
  </ion-toolbar>
</ion-header>
  
<ion-content class="ion-padding">
  <div class="services-grid">
    @for (service of services(); track service._id) {
      <div class="service-card" (click)="openModal(service)">
        <div class="icon-container">
          <ion-icon [name]="service.icon"></ion-icon>
        </div>
        <div class="service-info">
          <h3>{{ service.name }}</h3>
          <p>{{ service.description }}</p>
          <span class="price">a partir de R$ {{ service.price | number:'1.2-2' }}</span>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <p>Nenhum serviço cadastrado.</p>
      </div>
    }
  </div>

  <!-- Modal Cadastro de Serviço -->
  <app-service-form 
    [isOpen]="isModalOpen()" 
    [editingService]="editingService()" 
    [isEditMode]="isEditMode()"
    (closed)="closeModal()" 
    (saved)="onServiceSaved()">
  </app-service-form>

</ion-content>
