<ion-modal [isOpen]="isOpen()" (didDismiss)="closeModal()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ isEditMode() ? 'Editar Serviço' : 'Novo Serviço' }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeModal()">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <form [formGroup]="form" (ngSubmit)="saveService()">
        
        <div class="form-group">
          <label>Nome do Serviço</label>
          <input type="text" formControlName="name" placeholder="Ex: Elétrica" class="custom-input">
        </div>

        <div class="form-group">
          <label>Descrição</label>
          <textarea formControlName="description" rows="3" placeholder="Descrição do serviço" class="custom-input"></textarea>
        </div>

        <div class="form-group">
          <label>Preço Base (R$)</label>
          <input type="number" formControlName="price" placeholder="0.00" class="custom-input">
        </div>

        <div class="form-group">
          <label>Categoria</label>
          <select formControlName="category" class="custom-input">
            <option value="GERAL">Geral</option>
            <option value="MANUTENCAO">Manutenção</option>
            <option value="INSTALACAO">Instalação</option>
          </select>
        </div>

        <div class="form-group">
          <label>Ícone</label>
          <div class="icon-selector">
            @for (icon of availableIcons; track icon.name) {
              <div class="icon-option" 
                   [class.selected]="form.get('icon')?.value === icon.name"
                   (click)="form.get('icon')?.setValue(icon.name)">
                <ion-icon [name]="icon.name"></ion-icon>
                <span>{{ icon.label }}</span>
              </div>
            }
          </div>
        </div>

        <div class="form-group toggle-group">
          <label>Status Ativo</label>
          <ion-toggle [checked]="form.get('status')?.value === 'ACTIVE'" 
                      (ionChange)="form.get('status')?.setValue($event.detail.checked ? 'ACTIVE' : 'INACTIVE')">
          </ion-toggle>
        </div>

      </form>
    </ion-content>
    <div class="modal-footer">
      <button class="btn-outline" (click)="closeModal()">Cancelar</button>
      <button class="btn-primary" (click)="saveService()" [disabled]="form.invalid || isLoading">
        {{ isLoading ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>
  </ng-template>
</ion-modal>
