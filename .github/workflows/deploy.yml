name: Deploy Bravo Instalações Frontend

on:
  push:
    branches:
      - main
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci

      - name: Build do Projeto Angular/Ionic
        run: npx ionic build --prod

      # DEPLOY EM STAGING (Homologação)
      - name: Deploy para Firebase Hosting (Staging)
        if: github.ref_name == 'staging'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST_72D86D13 }}
          channelId: staging
          projectId: test-72d86d13

      # DEPLOY EM PRODUÇÃO (Live)
      - name: Deploy para Firebase Hosting (Produção)
        if: github.ref_name == 'main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST_72D86D13 }}
          channelId: live
          projectId: test-72d86d13
